# =============================================================================
# CCD#3 - Bottom Side Inspection Station
# AOI System for TI Package Inspection
# Station: BOTTOM_CHECK
# Last calibrated: 2025-09-12
# =============================================================================

station_id: CCD3_BOTTOM
description: "Bottom-up inspection for package underside defects, epoxy, and edge staining"

camera:
  model: MV-GE501GC
  interface: GigE Vision
  sensor_type: CMOS
  sensor_size_inch: 2/3
  pixel_size_um: 3.45
  max_resolution: [2448, 2048]
  bit_depth: 12
  color_mode: mono

lens:
  model: WWK03-110-230
  focal_length_mm: 110
  magnification: 0.3x
  aperture_range: [f/2.8, f/16]
  mount: C-mount

light_source:
  model: DN-COS60-W
  type: coaxial
  wavelength_nm: 6500  # white LED, 6500K color temperature
  diameter_mm: 60
  driver: constant_current
  controller_channel: 3

optical_parameters:
  resolution_mm_per_pixel: 0.0115
  fov_mm: [28, 24]
  working_distance_mm: 110
  working_distance_tolerance_mm: 2
  depth_of_field_mm: 1.2

mounting:
  orientation: bottom_up
  note: "Bottom-up capture; camera faces upward through transparent fixture"

environment:
  enclosure_required: true
  enclosure_type: dark_chamber
  purpose: "Prevent ambient light interference on bottom-up coaxial illumination"
  max_ambient_lux: 5
  enclosure_material: anodized_aluminum
  light_seal: labyrinth_baffle
  interlock: magnetic_reed_switch

acquisition:
  exposure_us: 900
  gain_db: 2.5
  trigger_mode: hardware
  trigger_source: line0
  trigger_edge: rising
  frame_rate_max_fps: 23
  pixel_format: Mono8
  roi:
    x: 0
    y: 0
    width: 2448
    height: 2048

image_preprocessing:
  flat_field_correction: true
  flat_field_ref: "calibration/ccd3_flatfield_20250912.tiff"
  background_subtraction: true
  background_ref: "calibration/ccd3_background_20250912.tiff"
  noise_reduction: gaussian
  noise_kernel_size: 3
  contrast_enhancement: clahe
  clahe_clip_limit: 2.0
  clahe_tile_size: [8, 8]

defects_detected:
  - crack
  - broken
  - epoxy_exposal
  - epoxy_overflow
  - staining_on_edge

inspection_thresholds:
  crack:
    min_length_mm: 0.05
    min_width_mm: 0.01
    severity: critical
  broken:
    min_area_mm2: 0.1
    severity: critical
  epoxy_exposal:
    min_area_mm2: 0.02
    severity: major
  epoxy_overflow:
    max_protrusion_mm: 0.10
    boundary_tolerance_mm: 0.05
    severity: major
  staining_on_edge:
    min_area_mm2: 0.01
    edge_band_width_mm: 0.5
    contrast_threshold: 25
    severity: minor
